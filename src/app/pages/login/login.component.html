<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="bg-success bg-opacity-10 text-success mx-auto rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="bi bi-person-circle fs-2"></i>
              </div>
              <h2 class="fw-bold mb-1">Welcome Back</h2>
              <p class="text-muted">Sign in to your WasteZero account</p>
            </div>

            <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
              <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
                {{ errorMessage }}
              </div>
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email address or Username</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                  <input type="text" class="form-control border-start-0 ps-0 bg-light" id="email" name="email" [(ngModel)]="email" required placeholder="Email or Username">
                </div>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <label for="password" class="form-label fw-semibold mb-0">Password</label>
                  <a routerLink="/forgot-password" class="text-success text-decoration-none small">Forgot password?</a>
                </div>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0 bg-light" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
                </div>
              </div>

              <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
              </div>

              <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill fw-bold shadow-sm" [disabled]="!loginForm.valid || isLoading" style="position: relative; z-index: 10; pointer-events: auto !important;">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                {{ isLoading ? 'Signing In...' : 'Sign In' }}
              </button>
            </form>

            <div class="position-relative my-4">
              <hr class="text-muted border-opacity-25">
              <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small fw-semibold">OR</span>
            </div>

            <div id="googleBtnContainer" class="d-flex justify-content-center mb-3"></div>

            <div class="text-center mt-4">
              <p class="text-muted mb-0">Don't have an account? <a routerLink="/register" class="text-success fw-bold text-decoration-none">Sign up</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
