<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="bg-success bg-opacity-10 text-success mx-auto rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="bi bi-shield-lock fs-2"></i>
              </div>
              <h2 class="fw-bold mb-1">Reset Password</h2>
              <p class="text-muted" *ngIf="step === 1">Enter your email to receive a code.</p>
              <p class="text-muted" *ngIf="step === 2 || step === 3">Secure your account.</p>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
              {{ errorMessage }}
            </div>
            <div *ngIf="successMessage" class="alert alert-success" role="alert">
              {{ successMessage }}
            </div>

            <!-- STEP 1: Email -->
            <form *ngIf="step === 1" (ngSubmit)="requestOtp()" #emailForm="ngForm">
              <div class="mb-4">
                <label for="email" class="form-label fw-semibold">Email address</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                  <input type="email" class="form-control border-start-0 ps-0 bg-light" id="email" name="email" [(ngModel)]="email" required placeholder="name&#64;example.com">
                </div>
              </div>

              <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill fw-bold shadow-sm" [disabled]="!emailForm.valid || loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Send OTP
              </button>
            </form>

            <!-- STEP 2: OTP -->
            <form *ngIf="step === 2" (ngSubmit)="verifyOtp()" #otpForm="ngForm">
              <div class="mb-4">
                <label for="otp" class="form-label fw-semibold">Enter 6-Digit OTP</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                  <input type="text" maxlength="6" class="form-control border-start-0 ps-0 bg-light fw-bold letter-spacing-2" id="otp" name="otp" [(ngModel)]="otp" required placeholder="000000" style="letter-spacing: 0.5rem;" autocomplete="off">
                </div>
              </div>

              <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill fw-bold shadow-sm" [disabled]="!otpForm.valid || loading || otp.length !== 6">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Verify Code
              </button>
            </form>

            <!-- STEP 3: New Password -->
            <form *ngIf="step === 3" (ngSubmit)="resetPassword()" #passwordForm="ngForm">
              <div class="mb-3">
                <label for="newPassword" class="form-label fw-semibold">New Password</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0 bg-light" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required placeholder="••••••••" minlength="6">
                </div>
              </div>
              
              <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input type="password" class="form-control border-start-0 ps-0 bg-light" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="••••••••" minlength="6">
                </div>
              </div>

              <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill fw-bold shadow-sm" [disabled]="!passwordForm.valid || loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Reset Password
              </button>
            </form>

            <!-- STEP 4: Success -->
            <div *ngIf="step === 4" class="text-center py-4">
              <div class="text-success mb-3">
                <i class="bi bi-check-circle-fill" style="font-size: 4rem;"></i>
              </div>
              <h4 class="fw-bold">Password Reset!</h4>
              <p class="text-muted mb-4">Your new password has been set successfully. You can now log in to your account.</p>
              <a routerLink="/login" class="btn btn-success w-100 rounded-pill fw-bold">Return to Login</a>
            </div>

            <div class="text-center mt-4" *ngIf="step !== 4">
              <a routerLink="/login" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
